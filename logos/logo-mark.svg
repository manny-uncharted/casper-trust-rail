<svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Trust Rail mark">
  <defs>
    <linearGradient id="tr-badge" x1="24" y1="20" x2="216" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF4350"/>
      <stop offset="1" stop-color="#B11226"/>
    </linearGradient>
    <linearGradient id="tr-rail" x1="60" y1="170" x2="184" y2="68" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FFE7D6"/>
    </linearGradient>
  </defs>

  <!-- Badge -->
  <rect x="16" y="16" width="208" height="208" rx="52" fill="url(#tr-badge)"/>
  <rect x="16.5" y="16.5" width="207" height="207" rx="51.5" fill="none" stroke="#FFFFFF" stroke-opacity="0.16"/>

  <!-- Rising rail (the climbing reputation / yield line) -->
  <path d="M56 150 L104 174 L184 70" stroke="url(#tr-rail)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Oracle data-nodes along the rail: input → process → attested output -->
  <circle cx="56" cy="150" r="9" fill="#7E0C18"/>
  <circle cx="56" cy="150" r="9" fill="#FFFFFF" fill-opacity="0.0"/>
  <circle cx="104" cy="174" r="9" fill="#7E0C18"/>
  <!-- Attested post: a sealed node at the apex -->
  <circle cx="184" cy="70" r="20" fill="#B11226" stroke="#FFFFFF" stroke-width="8"/>
  <path d="M176 70.5 L182 77 L193 64" stroke="#FFFFFF" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
